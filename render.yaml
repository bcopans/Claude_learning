services:
  - type: web
    name: kindpaw
    env: python
    rootDir: 07_dog_groomer_booking/marketplace
    buildCommand: pip install -r 07_dog_groomer_booking/marketplace/requirements.txt
    startCommand: gunicorn --chdir 07_dog_groomer_booking/marketplace app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
