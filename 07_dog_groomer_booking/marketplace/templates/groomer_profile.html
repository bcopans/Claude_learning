<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KindPaw — Groomer Profile</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="gprofile-page">

  <header class="nav">
    <a href="/search" class="logo">🐾 KindPaw</a>
    <div class="nav-spacer"></div>
    <div id="book-cta" style="display:none">
      <a id="book-btn" href="#" class="btn btn-primary" style="height:36px;padding:0 16px;font-size:0.85rem">Book now</a>
    </div>
  </header>

  <div id="content">
    <div class="loading-card">Loading…</div>
  </div>

  <!-- Portfolio photo upload modal -->
  <div class="photo-modal" id="photo-modal" style="display:none" onclick="closeModal(event)">
    <div class="photo-modal-card">
      <h3>Add a groom photo</h3>
      <div class="photo-drop-zone" id="drop-zone" onclick="document.getElementById('portfolio-file').click()">
        <div id="drop-preview" class="drop-preview-empty">
          <span style="font-size:2rem">📷</span>
          <span>Tap to choose a photo</span>
        </div>
      </div>
      <input type="file" id="portfolio-file" accept="image/*" style="display:none" onchange="previewPortfolioPhoto(event)">
      <div class="photo-modal-fields">
        <div class="field">
          <label>Dog's name</label>
          <input class="input" type="text" id="pm-dog-name" placeholder="e.g. Max" list="pm-dog-list">
          <datalist id="pm-dog-list"></datalist>
        </div>
        <div class="field">
          <label>Cut style</label>
          <input class="input" type="text" id="pm-cut" placeholder="e.g. Teddy bear, Puppy cut">
        </div>
        <div class="field">
          <label>Caption (optional)</label>
          <input class="input" type="text" id="pm-caption" placeholder="e.g. First groom — so nervous, so sweet">
        </div>
      </div>
      <p class="err" id="pm-err"></p>
      <div style="display:flex;gap:10px;margin-top:4px">
        <button class="btn btn-primary" style="flex:1" onclick="submitPortfolioPhoto()">Add to portfolio</button>
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

</div>

<script>
  const GROOMER_ID = {{ groomer_id }};
  let groomerData = null, pendingPortfolioUrl = null, pendingDogId = null;

  // ── localStorage utils ────────────────────────────────────────────────────

  function getUser() {
    try { return JSON.parse(localStorage.getItem('kindpaw_user') || '{}'); } catch { return {}; }
  }
  function saveUser(patch) {
    const u = getUser();
    Object.assign(u, patch);
    localStorage.setItem('kindpaw_user', JSON.stringify(u));
  }

  const BREEDS = ["Labrador Retriever","Golden Retriever","German Shepherd","Bulldog","Beagle","Poodle","Miniature Poodle","Chihuahua","Boxer","Miniature Schnauzer","Yorkshire Terrier","Dachshund","Shih Tzu","Doberman Pinscher","Great Dane","Siberian Husky","Rottweiler","Australian Shepherd","Border Collie","Cocker Spaniel","Pembroke Welsh Corgi","Maltese","Bichon Frise","Havanese","Shetland Sheepdog","Cavalier King Charles Spaniel","Pomeranian","Boston Terrier","Bernese Mountain Dog","Saint Bernard","Weimaraner","Goldendoodle","Labradoodle","Cavapoo","Cockapoo","Maltipoo","Aussiedoodle","Bernedoodle","Airedale Terrier","Rhodesian Ridgeback","Irish Setter","Samoyed","Whippet"];

  // ── Breed → dog.ceo slug ─────────────────────────────────────────────────

  const DOG_CEO = {
    'goldendoodle':'retriever/golden','labradoodle':'retriever/labrador',
    'poodle':'poodle','miniature poodle':'poodle','toy poodle':'poodle',
    'shih tzu':'shihtzu','labrador retriever':'labrador',
    'golden retriever':'retriever/golden','german shepherd':'germanshepherd',
    'siberian husky':'husky','miniature schnauzer':'schnauzer/miniature',
    'schnauzer':'schnauzer/standard','corgi':'corgi/cardigan',
    'pembroke welsh corgi':'pembroke','bichon frise':'bichon','maltese':'maltese',
    'cavapoo':'retriever/golden','cockapoo':'cocker','yorkshire terrier':'terrier/yorkshire',
    'cocker spaniel':'cocker','bernese mountain dog':'mountain/bernese',
    'boxer':'boxer','airedale terrier':'terrier/airedale','beagle':'beagle',
    'australian shepherd':'australian','border collie':'collie/border',
    'french bulldog':'bulldog/french','boston terrier':'terrier/boston',
    'chihuahua':'chihuahua','dachshund':'dachshund','dalmatian':'dalmatian',
    'great dane':'dane/great','havanese':'havanese','irish setter':'setter/irish',
    'pomeranian':'pomeranian','rhodesian ridgeback':'ridgeback/rhodesian',
    'rottweiler':'rottweiler','saint bernard':'stbernard','samoyed':'samoyed',
    'shetland sheepdog':'sheepdog/shetland','weimaraner':'weimaraner','whippet':'whippet',
  };

  async function breedPhoto(breed) {
    const slug = DOG_CEO[breed.toLowerCase()] || 'retriever/golden';
    try {
      const r = await fetch(`https://dog.ceo/api/breed/${slug}/images/random`);
      const d = await r.json();
      return d.status === 'success' ? d.message : null;
    } catch { return null; }
  }

  function stars(r) {
    return '★'.repeat(Math.floor(r)) + (r % 1 >= 0.5 ? '½' : '') + '☆'.repeat(5 - Math.ceil(r));
  }

  function priceLabel(s) {
    return s.price_type === 'from' ? `from $${s.price}` : `$${s.price}`;
  }

  // ── Upload helpers ────────────────────────────────────────────────────────

  async function uploadFile(file) {
    const fd = new FormData();
    fd.append('file', file);
    const res  = await fetch('/api/upload', { method: 'POST', body: fd });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    return data.url;
  }

  // ── Groomer avatar upload ─────────────────────────────────────────────────

  function triggerAvatarUpload() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = async e => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        const url = await uploadFile(file);
        await fetch(`/api/groomer/${GROOMER_ID}/photo`, {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ url }),
        });
        // Update avatar in DOM
        document.getElementById('groomer-avatar').innerHTML =
          `<img src="${url}" class="avatar-photo" alt="${groomerData.name}">`;
      } catch (err) { alert('Upload failed: ' + err.message); }
    };
    input.click();
  }

  // ── Portfolio photo modal ─────────────────────────────────────────────────

  function openPhotoModal() {
    document.getElementById('photo-modal').style.display = 'flex';
    document.getElementById('pm-err').style.display = 'none';
    document.getElementById('pm-dog-name').value = '';
    document.getElementById('pm-cut').value = '';
    document.getElementById('pm-caption').value = '';
    document.getElementById('drop-preview').innerHTML =
      '<span style="font-size:2rem">📷</span><span>Tap to choose a photo</span>';
    pendingPortfolioUrl = null;

    // Populate dog name datalist from groomer's past dogs (from portfolio)
    const dogs = [...new Set(groomerData.portfolio.map(p => p.dog_name).filter(Boolean))];
    document.getElementById('pm-dog-list').innerHTML = dogs.map(d => `<option value="${d}">`).join('');
  }

  function closeModal(e) {
    if (!e || e.target === document.getElementById('photo-modal')) {
      document.getElementById('photo-modal').style.display = 'none';
    }
  }

  function previewPortfolioPhoto(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      document.getElementById('drop-preview').innerHTML =
        `<img src="${ev.target.result}" style="width:100%;height:160px;object-fit:cover;border-radius:8px">`;
    };
    reader.readAsDataURL(file);
  }

  async function submitPortfolioPhoto() {
    const errEl = document.getElementById('pm-err');
    errEl.style.display = 'none';
    const file    = document.getElementById('portfolio-file').files[0];
    const dogName = document.getElementById('pm-dog-name').value.trim();
    const cut     = document.getElementById('pm-cut').value.trim();
    const caption = document.getElementById('pm-caption').value.trim();

    if (!file)    { errEl.textContent = 'Please choose a photo.'; errEl.style.display = 'block'; return; }
    if (!dogName) { errEl.textContent = "Enter the dog's name.";  errEl.style.display = 'block'; return; }

    const btn = document.querySelector('#photo-modal .btn-primary');
    btn.disabled = true; btn.textContent = 'Uploading…';

    try {
      const url = await uploadFile(file);
      // Find dog_id by name in past portfolio (fallback to 0)
      const match = groomerData.portfolio.find(p => p.dog_name === dogName);
      const dogId = match ? (match.dog_id || 0) : 0;

      await fetch('/api/portfolio-photo', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ groomer_id: GROOMER_ID, dog_id: dogId, url, caption, cut_style: cut }),
      });

      // Prepend new photo to portfolio grid
      const grid = document.getElementById('portfolio-grid');
      const item = document.createElement('div');
      item.className = 'portfolio-item';
      item.innerHTML = `
        <div class="portfolio-img-wrap">
          <img src="${url}" class="portfolio-img" alt="${dogName}">
        </div>
        ${cut ? `<div class="portfolio-review"><span class="stars-sm">✨</span> <span class="portfolio-review-text">${cut}</span></div>` : ''}
        <div class="portfolio-dog">${dogName}${caption ? ` · ${caption}` : ''}</div>
      `;
      grid.prepend(item);
      document.getElementById('photo-modal').style.display = 'none';
    } catch (err) {
      errEl.textContent = 'Upload failed: ' + err.message;
      errEl.style.display = 'block';
    } finally {
      btn.disabled = false; btn.textContent = 'Add to portfolio';
    }
  }

  // ── Personalization ───────────────────────────────────────────────────────

  function daysSince(dateStr) {
    return Math.round((new Date() - new Date(dateStr)) / 86400000);
  }

  function timeAgo(dateStr) {
    const d = daysSince(dateStr);
    if (d < 2)  return 'yesterday';
    if (d < 7)  return `${d} days ago`;
    if (d < 30) return `${Math.round(d/7)} week${Math.round(d/7) !== 1 ? 's' : ''} ago`;
    return `${Math.round(d/30)} month${Math.round(d/30) !== 1 ? 's' : ''} ago`;
  }

  function sortByBreed(containerSelector, itemSelector, breed) {
    const container = document.querySelector(containerSelector);
    if (!container || !breed) return;
    const q = breed.toLowerCase();
    const items = [...container.querySelectorAll(itemSelector)];
    const addCard = container.querySelector('.portfolio-add-card');
    items.sort((a, b) => {
      const aM = (a.dataset.breed || '').toLowerCase().includes(q) ? 1 : 0;
      const bM = (b.dataset.breed || '').toLowerCase().includes(q) ? 1 : 0;
      return bM - aM;
    });
    items.forEach(el => container.appendChild(el));
    if (addCard) container.appendChild(addCard);
  }

  function applyBreed(breed) {
    setTimeout(() => {
      sortByBreed('#portfolio-grid', '.portfolio-item[data-breed]', breed);
      sortByBreed('.reviews-list', '.review-item[data-breed]', breed);
    }, 0);
  }

  function resetBreed() {
    const u = getUser();
    delete u.breed_pref;
    localStorage.setItem('kindpaw_user', JSON.stringify(u));
    renderPersonalization(groomerData);
  }

  function renderPersonalization(g) {
    const slot = document.getElementById('personal-slot');
    if (!slot) return;

    const user = getUser();
    const groomBooking = (user.bookings_by_groomer || {})[GROOMER_ID];
    const primaryDog = groomBooking
      ? (user.dogs || []).find(d => d.id === groomBooking.dog_id) || user.dogs?.[0]
      : user.dogs?.[0];
    const breed = primaryDog?.breed || user.breed_pref || null;
    const breedMatch = breed && g.breed_expertise.some(b => b.toLowerCase().includes(breed.toLowerCase()));
    const fname = user.name ? user.name.split(' ')[0] : null;

    if (user.owner_id && groomBooking) {
      // Returning customer of this groomer
      slot.innerHTML = `
        <div class="personal-card personal-card--returning">
          <div class="personal-top">
            <div class="personal-greeting">Welcome back, ${fname} 👋</div>
            <div class="personal-detail">${groomBooking.dog_name}'s last visit was ${timeAgo(groomBooking.last_date)}</div>
          </div>
          <a href="/book/${g.id}" class="btn btn-primary" style="height:38px;padding:0 14px;font-size:0.84rem;white-space:nowrap">Book ${groomBooking.dog_name} again →</a>
        </div>`;
      applyBreed(breed);

    } else if (user.owner_id && primaryDog) {
      // Owner known, first time with this groomer
      const matchLine = breedMatch
        ? `<div class="personal-match-line">✓ ${g.name.split(' ')[0]} grooms ${primaryDog.breed}</div>`
        : `<div class="personal-nomatch-line">Not sure if ${g.name.split(' ')[0]} works with ${primaryDog.breed} — ask via chat</div>`;
      slot.innerHTML = `
        <div class="personal-card personal-card--owner">
          <div class="personal-top">
            <div class="personal-greeting">Hi ${fname}! Book for ${primaryDog.name}?</div>
            ${matchLine}
          </div>
          <a href="/book/${g.id}" class="btn btn-primary" style="height:38px;padding:0 14px;font-size:0.84rem;white-space:nowrap">Book ${primaryDog.name} →</a>
        </div>`;
      applyBreed(breed);

    } else if (breed) {
      // Breed known, anonymous
      const cuts = g.cut_specialties.slice(0, 4).join(' · ');
      const inner = breedMatch
        ? `<div class="personal-match-yes">
             <span class="personal-check">✓</span>
             <div>
               <div class="personal-match-breed">${g.name.split(' ')[0]} grooms ${breed}</div>
               ${cuts ? `<div class="personal-match-cuts">${cuts}</div>` : ''}
             </div>
           </div>
           <a href="/book/${g.id}" class="btn btn-primary" style="height:38px;padding:0 14px;font-size:0.84rem;white-space:nowrap">Book →</a>`
        : `<div class="personal-match-no">${g.name.split(' ')[0]} may not list ${breed} — <button class="link-btn" onclick="resetBreed()">try another breed</button></div>
           <a href="/book/${g.id}" class="btn btn-outline" style="height:38px;padding:0 14px;font-size:0.84rem;white-space:nowrap">Ask anyway →</a>`;
      slot.innerHTML = `<div class="personal-card personal-card--match">${inner}</div>`;
      applyBreed(breed);

    } else {
      // Cold — show breed input
      slot.innerHTML = `
        <div class="personal-card personal-card--cold">
          <div class="personal-prompt">What breed is your dog?</div>
          <div class="ac-wrap">
            <input class="input" type="text" id="breed-input" placeholder="e.g. Goldendoodle" autocomplete="off" style="height:44px">
          </div>
        </div>`;

      setTimeout(() => {
        const input = document.getElementById('breed-input');
        if (!input) return;
        const wrap = input.closest('.ac-wrap');
        const dd = document.createElement('div');
        dd.className = 'ac-dropdown';
        dd.style.display = 'none';
        wrap.appendChild(dd);

        function renderDd(val) {
          const q = val.toLowerCase().trim();
          if (!q) { dd.style.display = 'none'; return; }
          const hits = BREEDS.filter(b => b.toLowerCase().includes(q)).slice(0, 8);
          dd.innerHTML = hits.map(h => `<div class="ac-item" data-v="${h}">${h}</div>`).join('');
          dd.style.display = hits.length ? 'block' : 'none';
        }

        function commit(val) {
          if (!val) return;
          saveUser({ breed_pref: val });
          renderPersonalization(g);
        }

        input.addEventListener('input', e => renderDd(e.target.value));
        input.addEventListener('keydown', e => {
          const focused = dd.querySelector('.ac-item.focused');
          const items = [...dd.querySelectorAll('.ac-item')];
          if (e.key === 'ArrowDown') { e.preventDefault(); const n = focused ? (items[items.indexOf(focused)+1]||items[0]) : items[0]; focused?.classList.remove('focused'); n?.classList.add('focused'); }
          else if (e.key === 'ArrowUp') { e.preventDefault(); const p = focused ? (items[items.indexOf(focused)-1]||items[items.length-1]) : items[items.length-1]; focused?.classList.remove('focused'); p?.classList.add('focused'); }
          else if (e.key === 'Enter') { const v = focused ? focused.dataset.v : input.value.trim(); if (v) { dd.style.display = 'none'; commit(v); } }
          else if (e.key === 'Escape') { dd.style.display = 'none'; }
        });
        dd.addEventListener('mousedown', e => {
          const item = e.target.closest('.ac-item');
          if (!item) return;
          e.preventDefault(); input.value = item.dataset.v; dd.style.display = 'none'; commit(item.dataset.v);
        });
        document.addEventListener('click', e => { if (!wrap.contains(e.target)) dd.style.display = 'none'; });
      }, 0);
    }
  }

  // ── Main load ─────────────────────────────────────────────────────────────

  async function load() {
    const res = await fetch(`/api/groomer/${GROOMER_ID}`);
    groomerData = await res.json();
    const g = groomerData;

    document.title = `KindPaw — ${g.name}`;
    document.getElementById('book-btn').href = `/book/${g.id}`;
    document.getElementById('book-cta').style.display = 'block';

    const certs  = g.certification_tags.map(c => `<span class="cert-badge">${c}</span>`).join('');
    const specs  = g.specialization_tags.map(s => `<span class="tag">${s}</span>`).join('');
    const breedAll = g.breed_expertise;
    const breeds = breedAll.slice(0, 5).map(b => `<span class="tag">${b}</span>`).join('')
      + (breedAll.length > 5 ? `<span class="tag tag--gray">+${breedAll.length - 5} more</span>` : '');
    const cuts   = g.cut_specialties.map(c => `<span class="tag tag--blue">${c}</span>`).join('');

    function avatarBg(name) {
      const palette = ['#16A34A','#2563EB','#7C3AED','#DB2777','#D97706','#0891B2','#059669'];
      let h = 0; for (const c of name) h = ((h << 5) - h) + c.charCodeAt(0);
      return palette[Math.abs(h) % palette.length];
    }

    const avatarInner = g.photo_url
      ? `<img src="${g.photo_url}" class="avatar-photo" alt="${g.name}">`
      : g.name.charAt(0);
    const avatarStyle = g.photo_url ? '' : `style="background:${avatarBg(g.name)}"`;

    const trustBadges = [
      g.total_reviews >= 20 ? `<span class="trust-badge trust-badge--star">Top rated</span>` : '',
      g.certification_tags.length ? `<span class="trust-badge">Certified</span>` : '',
      `<span class="trust-badge">${g.total_reviews} grooms</span>`,
    ].filter(Boolean).join('');

    const services = g.services.map(s => `
      <div class="service-row">
        <div class="service-info">
          <div class="service-name">${s.name}</div>
          ${s.description ? `<div class="service-desc">${s.description}</div>` : ''}
        </div>
        <div class="service-right">
          <div class="service-price">${priceLabel(s)}</div>
          <div class="service-dur">${s.duration_mins} min</div>
          <a href="/book/${g.id}?service=${s.id}" class="btn-book-service">Book</a>
        </div>
      </div>
    `).join('');

    const portfolioItems = g.portfolio.length ? g.portfolio.map((p, i) => `
      <div class="portfolio-item" data-breed="${p.breed || ''}">
        <div class="portfolio-img-wrap" id="pimg-${i}">
          ${p.photo_url
            ? `<img src="${p.photo_url}" class="portfolio-img" alt="${p.breed || ''}">`
            : `<div class="portfolio-img-placeholder" id="pimg-${i}">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 5.172C10 3.782 8.423 2.457 6.5 3c-2.623.756-3.033 3.204-3 4 .034.796.082 1 .5 1.5C4.826 9.451 6 9.5 6 9.5h2.5A1.5 1.5 0 0 0 10 8V5.172z"/><path d="M14.267 5.172c0-1.39 1.577-2.715 3.5-2.172 2.623.756 3.033 3.204 3 4-.034.796-.082 1-.5 1.5-.826.951-2 1-2 1h-2.5a1.5 1.5 0 0 1-1.5-1.5V5.172z"/><path d="M6 9.5v8a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-8"/><path d="M9 9.5v3"/><path d="M15 9.5v3"/></svg>
                <span class="portfolio-breed" style="font-size:0.72rem;color:#9CA3AF;margin-top:4px">${p.breed || p.cut_style || 'Photo coming'}</span>
               </div>`}
        </div>
        ${p.rating ? `<div class="portfolio-review">
          <span class="stars-sm">${'★'.repeat(p.rating)}</span>
          <span class="portfolio-review-text">"${p.review_text ? p.review_text.slice(0,80) + '…' : ''}"</span>
        </div>` : ''}
        <div class="portfolio-dog">${p.dog_name}${p.caption ? ` · ${p.caption}` : ''}</div>
      </div>
    `).join('') : '';

    const reviews = g.reviews.length ? g.reviews.map(r => `
      <div class="review-item" data-breed="${r.breed || ''}">
        <div class="review-top">
          <div class="review-avatar" style="background:${avatarBg(r.owner_name)}">${r.owner_name.charAt(0)}</div>
          <div>
            <div style="font-weight:600;font-size:0.88rem">${r.owner_name} <span style="color:var(--muted);font-weight:400">· ${r.dog_name}${r.breed ? ` (${r.breed})` : ''}</span></div>
            <span class="stars" style="font-size:0.75rem">${'★'.repeat(r.rating)}</span>
          </div>
        </div>
        <p class="review-text">"${r.review_text}"</p>
      </div>
    `).join('') : '<p class="empty">No reviews yet.</p>';

    document.getElementById('content').innerHTML = `
      <div class="gprofile-hero">
        <div class="avatar-upload-wrap" onclick="triggerAvatarUpload()" title="Update profile photo">
          <div class="gprofile-avatar" id="groomer-avatar" ${avatarStyle}>${avatarInner}</div>
          <div class="avatar-upload-btn">📷</div>
        </div>
        <div class="gprofile-info">
          <h1>${g.name}</h1>
          <div class="gprofile-biz">${g.business_name} · ${g.location}</div>
          <div class="gprofile-rating">
            <span class="stars">${stars(g.avg_rating)}</span>
            <strong>${g.avg_rating}</strong>
          </div>
          <div class="trust-badges">${trustBadges}</div>
          ${certs ? `<div class="gprofile-certs" style="margin-top:6px">${certs}</div>` : ''}
        </div>
      </div>

      <div id="personal-slot"></div>

      <nav class="profile-nav">
        <a class="pnav-link" href="#sect-services">Services</a>
        <a class="pnav-link" href="#sect-portfolio">Portfolio</a>
        <a class="pnav-link" href="#sect-reviews">Reviews</a>
      </nav>

      <div class="gprofile-bio">${g.bio}</div>

      ${(specs || breeds || cuts) ? `
      <div class="gprofile-section">
        <h2>Expertise</h2>
        <div class="def-list">
          ${specs   ? `<div class="def-row"><span class="def-label">Specializes in</span><div class="def-val">${specs}</div></div>` : ''}
          ${breeds  ? `<div class="def-row"><span class="def-label">Breeds</span><div class="def-val">${breeds}</div></div>` : ''}
          ${cuts    ? `<div class="def-row"><span class="def-label">Cut styles</span><div class="def-val">${cuts}</div></div>` : ''}
        </div>
      </div>` : ''}

      <div class="gprofile-section" id="sect-services">
        <h2>Services & pricing</h2>
        <div class="services-list">${services}</div>
      </div>

      <div class="gprofile-section" id="sect-portfolio">
        <h2>Portfolio</h2>
        <div class="portfolio-grid" id="portfolio-grid">
          ${portfolioItems}
          <div class="portfolio-add-card" onclick="openPhotoModal()">
            <span class="portfolio-add-icon">📷</span>
            <span class="portfolio-add-label">Add groom photo</span>
          </div>
        </div>
      </div>

      <div class="gprofile-section" id="sect-reviews" style="padding-bottom:40px">
        <h2>Reviews (${g.reviews.length})</h2>
        <div class="reviews-list">${reviews}</div>
      </div>
    `;

    renderPersonalization(g);

    // Async-load breed photos for portfolio items with no uploaded photo
    g.portfolio.forEach(async (p, i) => {
      if (p.photo_url) return; // already has a real photo
      const url  = await breedPhoto(p.breed || 'labrador');
      const wrap = document.getElementById(`pimg-${i}`);
      if (url && wrap) {
        wrap.innerHTML = `<img src="${url}" class="portfolio-img" alt="${p.breed}" loading="lazy">`;
      }
    });
  }

  load();
</script>
</body>
</html>
