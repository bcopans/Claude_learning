<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KindPaw — Find a groomer</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="search-page">

  <header class="search-header">
    <a href="/" class="logo">🐾 KindPaw</a>
    <a href="/owner" class="header-link">Chat with Sage →</a>
  </header>

  <div class="search-hero">
    <h1>Find the right groomer for your dog</h1>
    <p>Every groomer on KindPaw is verified, certified, and care-first.</p>
  </div>

  <!-- Filters -->
  <div class="filter-bar">
    <div class="filter-group">
      <label>Breed</label>
      <input type="text" id="breed-filter" placeholder="e.g. Goldendoodle" oninput="applyFilters()">
    </div>
    <div class="filter-group">
      <label>Specialization</label>
      <div class="filter-chips" id="spec-filters">
        <button class="fchip" data-value="anxious dogs" onclick="toggleChip(this)">Anxious dogs</button>
        <button class="fchip" data-value="senior dogs" onclick="toggleChip(this)">Senior dogs</button>
        <button class="fchip" data-value="puppies" onclick="toggleChip(this)">Puppies</button>
        <button class="fchip" data-value="show cuts" onclick="toggleChip(this)">Show cuts</button>
      </div>
    </div>
    <div class="filter-group">
      <label>Cut style</label>
      <div class="filter-chips" id="cut-filters">
        <button class="fchip" data-value="teddy bear" onclick="toggleChip(this)">Teddy bear</button>
        <button class="fchip" data-value="puppy cut" onclick="toggleChip(this)">Puppy cut</button>
        <button class="fchip" data-value="deshed" onclick="toggleChip(this)">Deshed</button>
        <button class="fchip" data-value="hand-strip" onclick="toggleChip(this)">Hand strip</button>
      </div>
    </div>
  </div>

  <div class="results-bar">
    <span id="result-count"></span>
    <button class="clear-btn" id="clear-btn" onclick="clearFilters()" style="display:none">Clear filters</button>
  </div>

  <!-- Groomer cards -->
  <div class="groomer-grid" id="groomer-grid">
    <div class="loading-card">Loading groomers…</div>
  </div>

</div>

<script>
  let allGroomers = [];

  function stars(rating) {
    const full  = Math.floor(rating);
    const half  = rating % 1 >= 0.5 ? 1 : 0;
    const empty = 5 - full - half;
    return '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(empty);
  }

  function renderCard(g) {
    const specs = g.specialization_tags.slice(0, 3).map(s =>
      `<span class="tag">${s}</span>`).join('');
    const certs = g.certification_tags.map(c =>
      `<span class="cert-badge">${c}</span>`).join('');
    return `
      <div class="groomer-card">
        <div class="gcard-avatar">${g.name.charAt(0)}</div>
        <div class="gcard-body">
          <div class="gcard-top">
            <div>
              <div class="gcard-name">${g.name}</div>
              <div class="gcard-biz">${g.business_name} · ${g.location}</div>
            </div>
            <div class="gcard-rating">
              <span class="stars">${stars(g.avg_rating)}</span>
              <span class="rating-val">${g.avg_rating}</span>
              <span class="rating-cnt">(${g.total_reviews})</span>
            </div>
          </div>
          <p class="gcard-bio">${g.bio.slice(0, 120)}…</p>
          <div class="gcard-tags">${specs}</div>
          <div class="gcard-certs">${certs}</div>
          <div class="gcard-footer">
            <span class="gcard-price">From $${g.starting_from}</span>
            <a href="/groomer/${g.id}/profile" class="btn-secondary">View profile →</a>
          </div>
        </div>
      </div>`;
  }

  function applyFilters() {
    const breed   = document.getElementById('breed-filter').value.toLowerCase().trim();
    const specs   = [...document.querySelectorAll('#spec-filters .fchip.active')].map(c => c.dataset.value);
    const cuts    = [...document.querySelectorAll('#cut-filters .fchip.active')].map(c => c.dataset.value);
    const hasFilter = breed || specs.length || cuts.length;

    document.getElementById('clear-btn').style.display = hasFilter ? 'inline' : 'none';

    const filtered = allGroomers.filter(g => {
      if (breed && !g.breed_expertise.some(b => b.toLowerCase().includes(breed))) return false;
      if (specs.length && !specs.every(s => g.specialization_tags.some(t => t.toLowerCase().includes(s)))) return false;
      if (cuts.length  && !cuts.every(c => g.cut_specialties.some(t => t.toLowerCase().includes(c)))) return false;
      return true;
    });

    const grid = document.getElementById('groomer-grid');
    document.getElementById('result-count').textContent = `${filtered.length} groomer${filtered.length !== 1 ? 's' : ''} found`;

    if (!filtered.length) {
      grid.innerHTML = '<div class="empty-state">No groomers match those filters. <button onclick="clearFilters()" class="link-btn">Clear filters</button></div>';
    } else {
      grid.innerHTML = filtered.map(renderCard).join('');
    }
  }

  function toggleChip(btn) {
    btn.classList.toggle('active');
    applyFilters();
  }

  function clearFilters() {
    document.getElementById('breed-filter').value = '';
    document.querySelectorAll('.fchip.active').forEach(c => c.classList.remove('active'));
    applyFilters();
  }

  async function load() {
    const res = await fetch('/api/groomers');
    allGroomers = await res.json();
    applyFilters();
  }

  load();
</script>
</body>
</html>
