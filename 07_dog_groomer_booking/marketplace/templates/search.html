<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KindPaw — Find a groomer</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>

<header class="nav">
  <a href="/" class="logo">🐾 KindPaw</a>
  <div class="nav-spacer"></div>
  <a href="/owner" class="nav-link">Chat with Sage →</a>
</header>

<div class="search-hero">
  <h1>Find the right groomer</h1>
  <p>Every groomer is verified, certified, and care-first.</p>
</div>

<!-- NL search bar -->
<div class="nl-bar">
  <div class="nl-input-row">
    <svg class="nl-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="nl-input" class="nl-input" placeholder='Try "teddy bear cuts for poodles"' autocomplete="off">
    <button class="nl-mic" id="mic-btn" onclick="startVoice()" title="Voice search" aria-label="Voice search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    </button>
    <button class="nl-clear-btn" id="nl-clear" onclick="clearAll()" style="display:none" aria-label="Clear search">×</button>
  </div>
  <div class="active-pills" id="active-pills" style="display:none"></div>
</div>

<!-- Results bar + sort + filter toggle -->
<div class="results-bar">
  <span id="result-count"></span>
  <div class="results-bar-right">
    <select class="fbar-sort" id="sort-select" onchange="applyFilters()">
      <option value="rating">★ Best rated</option>
      <option value="reviews">Most reviewed</option>
      <option value="price-asc">Price: Low → High</option>
      <option value="price-desc">Price: High → Low</option>
    </select>
    <button class="filter-toggle-btn" id="filter-toggle-btn" onclick="toggleFilters()">
      ⚙ Filters <span class="filter-badge" id="filter-badge" style="display:none">0</span>
    </button>
    <div class="view-toggle">
      <button class="vtab vtab--active" id="tab-list" onclick="setView('list')">≡ List</button>
      <button class="vtab" id="tab-map"  onclick="setView('map')">⊕ Map</button>
    </div>
  </div>
</div>

<!-- Collapsible filter chip strip -->
<div class="filter-bar" id="filter-bar">
  <button class="fchip" id="chip-u60"    onclick="toggleChip('price','u60')"      >Under $60</button>
  <button class="fchip" id="chip-60-100" onclick="toggleChip('price','60-100')"   >$60–$100</button>
  <button class="fchip" id="chip-o100"   onclick="toggleChip('price','o100')"     >Over $100</button>
  <div class="fbar-divider"></div>
  <button class="fchip" id="chip-anxious"   onclick="toggleChip('spec','anxious dogs')" >😰 Anxious dogs</button>
  <button class="fchip" id="chip-puppies"   onclick="toggleChip('spec','puppies')"      >🐶 Puppies</button>
  <button class="fchip" id="chip-senior"    onclick="toggleChip('spec','senior dogs')"  >🐕 Senior dogs</button>
  <button class="fchip" id="chip-deshed"    onclick="toggleChip('spec','deshed')"       >🪮 Deshed</button>
  <button class="fchip" id="chip-handstrip" onclick="toggleChip('spec','hand-strip')"   >✂️ Hand-strip</button>
</div>

<!-- List view -->
<div class="groomer-grid" id="groomer-grid"></div>

<!-- Map view -->
<div id="map-view" style="display:none">
  <div id="map" class="map-container"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  let allGroomers = [], filteredGroomers = [], map = null, markers = [], recognition = null;
  let activePrice = null;     // 'u60' | '60-100' | 'o100' | null
  let activeSpecs = new Set(); // 'anxious dogs' | 'puppies' | etc.

  const BREEDS = ["Labrador Retriever","Golden Retriever","German Shepherd","Bulldog","Beagle","Poodle","Miniature Poodle","Chihuahua","Boxer","Miniature Schnauzer","Yorkshire Terrier","Dachshund","Shih Tzu","Doberman Pinscher","Great Dane","Siberian Husky","Rottweiler","Australian Shepherd","Border Collie","Cocker Spaniel","Pembroke Welsh Corgi","Maltese","Bichon Frise","Havanese","Shetland Sheepdog","Cavalier King Charles Spaniel","Pomeranian","Boston Terrier","Bernese Mountain Dog","Saint Bernard","Weimaraner","Goldendoodle","Labradoodle","Cavapoo","Cockapoo","Maltipoo","Aussiedoodle","Bernedoodle","Airedale Terrier","Rhodesian Ridgeback","Belgian Malinois","Italian Greyhound","Whippet","Basenji","Bloodhound","Basset Hound","Irish Setter","Samoyed"];

  const BREED_ALIASES = {
    'pom':'Pomeranian','poms':'Pomeranian',
    'golden':'Golden Retriever','goldens':'Golden Retriever','goldie':'Golden Retriever','goldies':'Golden Retriever',
    'lab':'Labrador Retriever','labs':'Labrador Retriever',
    'doodle':'Goldendoodle','doodles':'Goldendoodle',
    'yorkie':'Yorkshire Terrier','yorkies':'Yorkshire Terrier',
    'husky':'Siberian Husky','huskies':'Siberian Husky',
    'corgi':'Pembroke Welsh Corgi','corgis':'Pembroke Welsh Corgi',
    'aussie':'Australian Shepherd','aussies':'Australian Shepherd',
    'bichon':'Bichon Frise',
    'schnauzer':'Miniature Schnauzer','schnauzers':'Miniature Schnauzer',
    'doxie':'Dachshund','doxies':'Dachshund','weenie':'Dachshund','wiener':'Dachshund',
    'cocker':'Cocker Spaniel',
    'bernese':'Bernese Mountain Dog','berner':'Bernese Mountain Dog','berners':'Bernese Mountain Dog',
    'sheltie':'Shetland Sheepdog','shelties':'Shetland Sheepdog',
    'maltipoo':'Maltipoo','cavapoo':'Cavapoo','labradoodle':'Labradoodle',
    'cockapoo':'Cockapoo','aussiedoodle':'Aussiedoodle','bernedoodle':'Bernedoodle',
  };

  const SPEC_KEYWORDS = [
    ['teddy bear','teddy bear'],['puppy cut','puppy cut'],
    ['show cut','show cuts'],['show cuts','show cuts'],['competition cut','show cuts'],
    ['hand strip','hand-strip'],['hand-strip','hand-strip'],['hand stripping','hand-strip'],['hand stripped','hand-strip'],
    ['anxious','anxious dogs'],['nervous','anxious dogs'],['scared','anxious dogs'],['anxiety','anxious dogs'],
    ['senior','senior dogs'],['older dog','senior dogs'],['old dog','senior dogs'],
    ['puppy','puppies'],['pup','puppies'],
    ['deshed','deshed'],['de-shed','deshed'],['shedding','deshed'],
  ];

  function parseNL(text) {
    const lower = text.toLowerCase();
    let breed = '';
    const specs = new Set();
    for (const [alias, canonical] of Object.entries(BREED_ALIASES)) {
      if (new RegExp(`\\b${alias}\\b`, 'i').test(lower)) { breed = canonical; break; }
    }
    if (!breed) breed = BREEDS.find(b => lower.includes(b.toLowerCase())) || '';
    for (const [kw, val] of SPEC_KEYWORDS) {
      if (lower.includes(kw)) specs.add(val);
    }
    return { breed, specs: [...specs] };
  }

  function toggleFilters() {
    const bar = document.getElementById('filter-bar');
    const btn = document.getElementById('filter-toggle-btn');
    bar.classList.toggle('open');
    btn.classList.toggle('filter-toggle-btn--active', bar.classList.contains('open'));
  }

  function updateFilterBadge() {
    const count = (activePrice ? 1 : 0) + activeSpecs.size;
    const badge = document.getElementById('filter-badge');
    badge.style.display = count ? 'inline-flex' : 'none';
    badge.textContent = count;
    const btn = document.getElementById('filter-toggle-btn');
    btn.classList.toggle('filter-toggle-btn--active', count > 0 || document.getElementById('filter-bar').classList.contains('open'));
  }

  function toggleChip(type, val) {
    if (type === 'price') {
      activePrice = (activePrice === val) ? null : val;
      ['u60','60-100','o100'].forEach(k => {
        document.getElementById('chip-' + k).classList.toggle('fchip--active', activePrice === k);
      });
    } else {
      const id = 'chip-' + val.replace(/ /g,'-').replace(/[^a-z0-9-]/g,'');
      if (activeSpecs.has(val)) { activeSpecs.delete(val); document.getElementById(id).classList.remove('fchip--active'); }
      else                       { activeSpecs.add(val);    document.getElementById(id).classList.add('fchip--active'); }
    }
    updateFilterBadge();
    applyFilters();
  }

  function avatarBg(name) {
    const palette = ['#16A34A','#2563EB','#7C3AED','#DB2777','#D97706','#0891B2','#059669'];
    let h = 0; for (const c of name) h = ((h << 5) - h) + c.charCodeAt(0);
    return palette[Math.abs(h) % palette.length];
  }

  function renderCard(g) {
    const avatarStyle = g.photo_url ? '' : `style="background:${avatarBg(g.name)}"`;
    const avatar = g.photo_url ? `<img src="${g.photo_url}" alt="${g.name}">` : g.name.charAt(0);
    const coverHtml = g.cover_photo_url
      ? `<div class="gcard-cover"><img src="${g.cover_photo_url}" alt="${g.name} portfolio"></div>`
      : '';

    // Breed match badge
    const raw = document.getElementById('nl-input').value.trim().toLowerCase();
    const { breed } = raw ? parseNL(raw) : { breed: '' };
    const hasBreedMatch = breed && g.breed_expertise.some(b => b.toLowerCase().includes(breed.toLowerCase()));
    const breedMatchHtml = hasBreedMatch
      ? `<div class="gcard-match">✓ Does ${breed}</div>`
      : '';

    // Single meta line: location · top 2 specialties
    const topTags = [...(g.cut_specialties || []), ...(g.specialization_tags || [])].slice(0, 2);
    const metaParts = [g.location, ...topTags];
    const metaHtml = `<div class="gcard-meta">${metaParts.join(' · ')}</div>`;

    return `
      <div class="groomer-card${coverHtml ? ' groomer-card--has-cover' : ''}" onclick="location.href='/groomer/${g.id}/profile'" style="cursor:pointer">
        ${coverHtml}
        <div class="gcard-main">
          <div class="gcard-avatar" ${avatarStyle}>${avatar}</div>
          <div class="gcard-body">
            <div class="gcard-top">
              <div class="gcard-name">${g.name}</div>
              <div class="gcard-rating-pill">★ ${g.avg_rating} <span class="gcard-reviews">(${g.total_reviews})</span></div>
            </div>
            ${metaHtml}
            ${breedMatchHtml}
            <div class="gcard-footer">
              <span class="gcard-price">From $${g.starting_from}</span>
              <a href="/groomer/${g.id}/profile" class="btn btn-primary" style="height:36px;padding:0 16px;font-size:0.82rem" onclick="event.stopPropagation()">Book →</a>
            </div>
          </div>
        </div>
      </div>`;
  }

  function renderActivePills(breed, specs) {
    const el = document.getElementById('active-pills');
    const pills = [];
    if (breed) pills.push(`<span class="af-pill">${breed}</span>`);
    specs.forEach(s => pills.push(`<span class="af-pill">${s}</span>`));
    if (pills.length) {
      el.innerHTML = pills.join('') + `<button class="af-clear" onclick="clearNL()">Clear</button>`;
      el.style.display = 'flex';
    } else {
      el.style.display = 'none';
      el.innerHTML = '';
    }
  }

  function sortGroomers(list) {
    const s = document.getElementById('sort-select').value;
    return [...list].sort((a, b) => {
      if (s === 'price-asc')  return a.starting_from - b.starting_from;
      if (s === 'price-desc') return b.starting_from - a.starting_from;
      if (s === 'reviews')    return b.total_reviews - a.total_reviews;
      return b.avg_rating - a.avg_rating; // default: best rated
    });
  }

  function applyFilters() {
    const raw = document.getElementById('nl-input').value.trim();
    const { breed, specs: nlSpecs } = raw ? parseNL(raw) : { breed: '', specs: [] };

    document.getElementById('nl-clear').style.display = raw ? 'inline' : 'none';
    renderActivePills(breed, nlSpecs);

    // Combine NL specs with chip specs
    const allSpecs = new Set([...nlSpecs, ...activeSpecs]);

    filteredGroomers = allGroomers.filter(g => {
      if (breed && !g.breed_expertise.some(b => b.toLowerCase().includes(breed.toLowerCase()))) return false;
      if (allSpecs.size && ![...allSpecs].every(s => g.specialization_tags.some(t => t.toLowerCase().includes(s)))) return false;
      if (activePrice === 'u60'   && g.starting_from >= 60)  return false;
      if (activePrice === '60-100' && (g.starting_from < 60 || g.starting_from > 100)) return false;
      if (activePrice === 'o100'  && g.starting_from <= 100) return false;
      return true;
    });

    filteredGroomers = sortGroomers(filteredGroomers);

    const count = filteredGroomers.length;
    document.getElementById('result-count').textContent = `${count} groomer${count !== 1 ? 's' : ''} found`;

    const grid = document.getElementById('groomer-grid');
    grid.innerHTML = count
      ? filteredGroomers.map(renderCard).join('')
      : '<div class="empty-state">No groomers match — <button onclick="clearAll()" class="link-btn">clear all filters</button></div>';

    if (map) updateMapMarkers();
  }

  function clearNL() {
    document.getElementById('nl-input').value = '';
    applyFilters();
  }

  function clearAll() {
    document.getElementById('nl-input').value = '';
    activePrice = null;
    activeSpecs.clear();
    ['u60','60-100','o100'].forEach(k => document.getElementById('chip-' + k).classList.remove('fchip--active'));
    ['anxious','puppies','senior','deshed','handstrip'].forEach(k => {
      const el = document.getElementById('chip-' + k);
      if (el) el.classList.remove('fchip--active');
    });
    applyFilters();
  }

  // ── Voice search ──────────────────────────────────────────────────────────
  function startVoice() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert('Voice search isn\'t supported in this browser. Try Chrome or Safari.'); return; }
    if (recognition) { recognition.stop(); return; }

    recognition = new SR();
    recognition.lang = 'en-US';
    recognition.interimResults = false;

    const mic = document.getElementById('mic-btn');
    mic.classList.add('listening');

    recognition.onresult = (e) => {
      document.getElementById('nl-input').value = e.results[0][0].transcript;
      applyFilters();
    };
    recognition.onend  = () => { recognition = null; mic.classList.remove('listening'); };
    recognition.onerror = () => { recognition = null; mic.classList.remove('listening'); };
    recognition.start();
  }

  // ── Map ──────────────────────────────────────────────────────────────────
  function setView(v) {
    const isList = v === 'list';
    document.getElementById('groomer-grid').style.display = isList ? '' : 'none';
    document.getElementById('map-view').style.display     = isList ? 'none' : 'block';
    document.getElementById('tab-list').classList.toggle('vtab--active', isList);
    document.getElementById('tab-map').classList.toggle('vtab--active', !isList);
    if (!isList) { if (!map) initMap(); else { map.invalidateSize(); updateMapMarkers(); } }
  }

  function initMap() {
    map = L.map('map').setView([40.73, -74.0], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>'
    }).addTo(map);
    updateMapMarkers();
  }

  function updateMapMarkers() {
    markers.forEach(m => m.remove());
    markers = [];
    filteredGroomers.filter(g => g.lat && g.lng).forEach(g => {
      const popup = `
        <div style="min-width:180px">
          <strong style="font-size:0.95rem">${g.name}</strong><br>
          <span style="color:#6B7280;font-size:0.8rem">${g.business_name}</span><br>
          <span style="color:#F59E0B;font-size:0.8rem">${'★'.repeat(Math.floor(g.avg_rating))} ${g.avg_rating}</span>
          <span style="color:#6B7280;font-size:0.75rem">(${g.total_reviews})</span><br>
          <strong style="color:#16A34A;font-size:0.85rem">From $${g.starting_from}</strong><br>
          <a href="/groomer/${g.id}/profile" style="color:#16A34A;font-size:0.82rem;font-weight:600">View profile →</a>
        </div>`;
      const icon = L.divIcon({
        html: `<div style="background:#7C3AED;color:#fff;border-radius:9999px;padding:4px 10px;font-size:0.75rem;font-weight:700;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.2)">${g.name.split(' ')[0]}</div>`,
        className: '', iconAnchor: [30, 12],
      });
      markers.push(L.marker([g.lat, g.lng], { icon }).bindPopup(popup).addTo(map));
    });
  }

  async function load() {
    const res = await fetch('/api/groomers');
    allGroomers = await res.json();
    document.getElementById('nl-input').addEventListener('input', applyFilters);
    applyFilters();
  }

  load();
</script>
</body>
</html>
